repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.7
    hooks:
      - id: ruff-format
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]

  - repo: local
    hooks:
      - id: unit-tests
        name: unit tests
        entry: python3 -m pytest tests/unit/ -x -q --tb=short -o "addopts="
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
