name: Release & Publish

on:
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  AZURE_DEVOPS_ORG: solya-azure-devops
  AZURE_DEVOPS_PROJECT: sparkless
  AZURE_DEVOPS_FEED: sparkless

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install semantic-release
        run: npm install -g semantic-release @semantic-release/changelog @semantic-release/git @semantic-release/exec

      - name: Run semantic-release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx semantic-release 2>&1 | tee sr_output.txt
          VERSION=$(grep -oP 'The next release version is \K[0-9]+\.[0-9]+\.[0-9]+' sr_output.txt || true)
          if [ -n "$VERSION" ]; then
            echo "new_release_published=true" >> $GITHUB_OUTPUT
            echo "new_release_version=$VERSION" >> $GITHUB_OUTPUT
            echo "Published version: $VERSION"
          else
            echo "new_release_published=false" >> $GITHUB_OUTPUT
            echo "No new release"
          fi

  publish:
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: v${{ needs.release.outputs.new_release_version }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]" build twine

      - name: Run tests
        env:
          TZ: "America/New_York"
        run: python -m pytest tests/unit/ tests/parity/ -q --tb=short -o "addopts="

      - name: Build package
        run: python -m build

      - name: Verify build
        run: |
          ls -la dist/
          echo "Version: ${{ needs.release.outputs.new_release_version }}"

      - name: Publish to Azure Artifacts
        env:
          AZURE_DEVOPS_PAT: ${{ secrets.AZURE_DEVOPS_PAT }}
        run: |
          for f in dist/*.whl dist/*.tar.gz; do
            echo "Uploading $f..."
            twine upload \
              --non-interactive \
              --repository-url "https://pkgs.dev.azure.com/${AZURE_DEVOPS_ORG}/${AZURE_DEVOPS_PROJECT}/_packaging/${AZURE_DEVOPS_FEED}/pypi/upload/" \
              --username _ \
              --password "${AZURE_DEVOPS_PAT}" \
              "$f" || echo "Warning: upload of $f failed (may already exist)"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/
